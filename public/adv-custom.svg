<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7F7F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EEEEEE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blockTop1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D8D8D8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blockFace1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blockSide1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#111111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333333;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#CCFF00;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#CCFF00;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#CCFF00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CCFF00;stop-opacity:0" />
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#000000" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>

  <!-- === BOTTOM FOUNDATION BLOCK (large, black) === -->
  <!-- Front face -->
  <polygon points="160,420 520,420 520,490 160,490" fill="url(#blockFace1)" filter="url(#softShadow)"/>
  <!-- Top face (isometric) -->
  <polygon points="160,420 200,400 560,400 520,420" fill="#2A2A2A"/>
  <!-- Right side face -->
  <polygon points="520,420 560,400 560,470 520,490" fill="url(#blockSide1)"/>

  <!-- === MIDDLE BLOCK (white, stepped left) === -->
  <!-- Front face -->
  <polygon points="160,345 440,345 440,415 160,415" fill="url(#blockTop1)" filter="url(#softShadow)"/>
  <!-- Top face -->
  <polygon points="160,345 200,325 480,325 440,345" fill="#FFFFFF"/>
  <!-- Right side face -->
  <polygon points="440,345 480,325 480,395 440,415" fill="#C8C8C8"/>

  <!-- === TOP BLOCK (black, stepped right) === -->
  <!-- Front face -->
  <polygon points="260,270 560,270 560,340 260,340" fill="url(#blockFace1)" filter="url(#softShadow)"/>
  <!-- Top face -->
  <polygon points="260,270 300,250 600,250 560,270" fill="#2A2A2A"/>
  <!-- Right side face -->
  <polygon points="560,270 600,250 600,320 560,340" fill="url(#blockSide1)"/>

  <!-- === SMALL ACCENT BLOCK (neon, top right) === -->
  <!-- Front face -->
  <polygon points="500,195 620,195 620,245 500,245" fill="#CCFF00" filter="url(#softShadow)"/>
  <!-- Top face -->
  <polygon points="500,195 530,180 650,180 620,195" fill="#DDFF33"/>
  <!-- Right side face -->
  <polygon points="620,195 650,180 650,230 620,245" fill="#99CC00"/>

  <!-- === NEON LASER HIGHLIGHT LINE === -->
  <!-- The precision laser scan between middle and top blocks -->
  <rect x="150" y="338" width="420" height="3" fill="url(#neonGlow)" filter="url(#glowFilter)" opacity="0.9"/>
  <!-- Secondary glow -->
  <rect x="150" y="337" width="420" height="5" fill="#CCFF00" opacity="0.15" filter="url(#innerGlow)"/>

  <!-- Precision tick marks along the laser -->
  <g fill="#CCFF00" filter="url(#glowFilter)">
    <rect x="200" y="330" width="2" height="18"/>
    <rect x="250" y="332" width="2" height="14"/>
    <rect x="300" y="330" width="2" height="18"/>
    <rect x="350" y="332" width="2" height="14"/>
    <rect x="400" y="330" width="2" height="18"/>
    <rect x="450" y="332" width="2" height="14"/>
    <rect x="500" y="330" width="2" height="18"/>
  </g>

  <!-- === SMALL FLOATING DATA CUBES (right side) === -->
  <!-- Cube 1 -->
  <polygon points="630,290 660,290 660,320 630,320" fill="#1A1A1A" opacity="0.85"/>
  <polygon points="630,290 645,278 675,278 660,290" fill="#2E2E2E" opacity="0.85"/>
  <polygon points="660,290 675,278 675,308 660,320" fill="#0A0A0A" opacity="0.85"/>

  <!-- Cube 2 -->
  <polygon points="645,190 668,190 668,213 645,213" fill="#EEEEEE" opacity="0.9"/>
  <polygon points="645,190 657,180 680,180 668,190" fill="#FFFFFF" opacity="0.9"/>
  <polygon points="668,190 680,180 680,203 668,213" fill="#CCCCCC" opacity="0.9"/>

  <!-- === NEON CORNER MARKERS (precision indicators) === -->
  <!-- Top-left of middle block -->
  <g fill="none" stroke="#CCFF00" stroke-width="2" filter="url(#glowFilter)">
    <polyline points="158,335 158,345 168,345"/>
    <polyline points="438,345 448,345 448,335"/>
  </g>

  <!-- === BOTTOM LABEL DOTS === -->
  <g fill="#CCFF00">
    <circle cx="180" cy="455" r="4" filter="url(#glowFilter)"/>
    <circle cx="200" cy="455" r="4" filter="url(#glowFilter)"/>
    <circle cx="220" cy="455" r="4" filter="url(#glowFilter)"/>
  </g>

  <!-- === DIMENSION LINES === -->
  <g stroke="#CCFF00" stroke-width="1" opacity="0.6" filter="url(#glowFilter)">
    <!-- Vertical height indicator -->
    <line x1="130" y1="340" x2="130" y2="420"/>
    <line x1="124" y1="340" x2="136" y2="340"/>
    <line x1="124" y1="420" x2="136" y2="420"/>
  </g>

  <!-- === FLOATING NEON PARTICLES === -->
  <g fill="#CCFF00" filter="url(#glowFilter)" opacity="0.7">
    <circle cx="620" cy="155" r="3"/>
    <circle cx="640" cy="148" r="2"/>
    <circle cx="655" cy="160" r="2.5"/>
    <circle cx="670" cy="145" r="2"/>
    <circle cx="690" cy="155" r="3"/>
  </g>

</svg>
